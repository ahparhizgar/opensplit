services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: opensplit
      POSTGRES_PASSWORD: opensplitpass
      POSTGRES_DB: opensplitdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      JDBC_DATABASE_URL: jdbc:postgresql://db:5432/opensplitdb
      POSTGRES_USER: opensplit
      POSTGRES_PASSWORD: opensplitpass
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  db_data:

