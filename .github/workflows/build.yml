name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Replace Gradle wrapper URL
        run: |
          # Replace Myket Gradle distribution host with the official services.gradle.org
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            sed -i 's|maven.myket.ir/gradle|services.gradle.org|g' gradle/wrapper/gradle-wrapper.properties
            echo "Updated gradle-wrapper.properties:" && grep distributionUrl gradle/wrapper/gradle-wrapper.properties || true
          else
            echo "No gradle-wrapper.properties found, skipping URL replacement"
          fi

      - name: Run unit tests
        run: ./gradlew jvmTest

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"
